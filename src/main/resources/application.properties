spring.application.name=upi-offline

server.port=${PORT:8081}

# H2 DATABASE
spring.datasource.url=jdbc:h2:mem:upioffline
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect


# H2 CONSOLE
# Local:
# http://localhost:8081/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# LOGGING
logging.level.com.satyajit.upioffline=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n


# IDEMPOTENCY
upi.mesh.idempotency-ttl-seconds=86400


# PACKET FRESHNESS WINDOW
upi.mesh.packet-max-age-seconds=86400